version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: financial-dashboard-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: financial-dashboard
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - dashboard-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Express (GUI - Optional)
  mongo-express:
    image: mongo-express:latest
    container_name: financial-dashboard-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - dashboard-network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  dashboard-network:
    driver: bridge

# ============================================
# HOW TO USE:
# ============================================
# 1. Install Docker: https://www.docker.com/products/docker-desktop
#
# 2. Start services:
#    docker-compose up -d
#
# 3. MongoDB will be available at:
#    mongodb://admin:password@localhost:27017/financial-dashboard
#
# 4. MongoDB Express (GUI) available at:
#    http://localhost:8081
#    Username: admin
#    Password: password
#
# 5. Use this connection string in backend/.env:
#    MONGODB_URI=mongodb://admin:password@localhost:27017/financial-dashboard?authSource=admin
#
# 6. Stop services:
#    docker-compose down
#
# 7. Stop and remove data:
#    docker-compose down -v
# ============================================
